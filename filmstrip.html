<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DirecTV Filmstrip</title>

  <!-- Ruffle -->
  <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #player {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

<div id="player"></div>

<script>
  window.RufflePlayer = window.RufflePlayer || {};
  window.RufflePlayer.config = {
    autoplay: "on",
    unmuteOverlay: "hidden",
    splashScreen: false, // 🚀 removes splash
    contextMenu: false
  };

  const ruffle = window.RufflePlayer.newest();
  const player = ruffle.createPlayer();

  document.getElementById("player").appendChild(player);

  player.load({
    url: "https://halohash.github.io/directv/filmstrip.v3.swf?lmt=2010-07-08T18%3A10%3A19.716Z&prospect=false&filmstripxml=%2FDTVAPP%2Ffilmstrip%2FfilmstripXml.jsp"
  });
</script>

</body>
</html>
